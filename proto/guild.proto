syntax = "proto3";

package axollot.gateway.v1;

import "google/protobuf/timestamp.proto";
import "common.proto";
import "messaging.proto";
import "guild.proto";
import "people.proto";

// WebSocket — ТОЛЬКО real-time события и хендшейк.
// Всё что request/response (история, списки, CRUD) — через gRPC сервисы.

message Handshake {
    string session_token = 1;
    optional int64 last_received_msg_id = 2;
}

message HandshakeAck {
    axollot.common.v1.Status status = 1;
    string user_id = 2;
    repeated axollot.messaging.v1.MessageEvent missed_messages = 3;
}

message Ping {
    google.protobuf.Timestamp client_time = 1;
}

message Pong {
    google.protobuf.Timestamp client_time = 1;
    google.protobuf.Timestamp server_time = 2;
}

// --- Real-time события от сервера ---

message TypingEvent {
    string channel_id = 1;
    string user_id = 2;
}

message PresenceEvent {
    string user_id = 1;
    axollot.people.v1.OnlineStatus status = 2;
}

message MessageDeletedEvent {
    string channel_id = 1;
    repeated string message_id = 2;
}

message MessageEditedEvent {
    string channel_id = 1;
    axollot.messaging.v1.MessageEvent message = 2;
}

message FriendRequestEvent {
    axollot.people.v1.Person from = 1;
}

message GuildMemberJoinedEvent {
    string guild_id = 1;
    axollot.people.v1.Person member = 2;
}

message GuildMemberLeftEvent {
    string guild_id = 1;
    string user_id = 2;
}

message ChannelCreatedEvent {
    axollot.guild.v1.Channel channel = 1;
}

message ChannelDeletedEvent {
    string guild_id = 1;
    string channel_id = 2;
}

message ChannelUpdatedEvent {
    axollot.guild.v1.Channel channel = 1;
}

enum AppLifecycleState {
    APP_LIFECYCLE_STATE_UNSPECIFIED = 0;
    APP_LIFECYCLE_STATE_FOREGROUND = 1;
    APP_LIFECYCLE_STATE_BACKGROUND = 2;
}

message AppStateEvent {
    AppLifecycleState state = 1;
}

// Конверт для WebSocket — теперь только real-time
message Packet {
    string request_id = 1;

    oneof payload {
        // Соединение
        Handshake handshake = 2;
        HandshakeAck handshake_ack = 3;
        Ping ping = 4;
        Pong pong = 5;

        // Сообщения (отправка + входящие)
        axollot.messaging.v1.SendMessage send_message = 10;
        axollot.messaging.v1.MessageEvent message_event = 11;
        MessageDeletedEvent message_deleted = 12;
        MessageEditedEvent message_edited = 13;
        TypingEvent typing = 14;

        // Присутствие
        PresenceEvent presence = 20;

        // Друзья
        FriendRequestEvent friend_request = 30;

        // Гильдии
        GuildMemberJoinedEvent guild_member_joined = 40;
        GuildMemberLeftEvent guild_member_left = 41;

        ChannelCreatedEvent channel_created = 42;
        ChannelDeletedEvent channel_deleted = 43;
        ChannelUpdatedEvent channel_updated = 44;

        AppStateEvent app_state = 45;
    }
}
